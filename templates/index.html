<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Wake-on-LAN Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
</head>
<body>
    <div class="container" data-wol-cooldown-seconds="{{ wol_cooldown_seconds }}">
        <div class="header">
            <h1><span class="header-icon">🌐</span> WOL Manager</h1>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
        </div>

        <div id="hosts" class="hosts-grid">
            <div class="loading">Loading devices...</div>
        </div>

        <div class="footer">
            <p>Status polling is active while this page is open.</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
